context:
  name: typstyle
  version: "0.14.0"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/typstyle-rs/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2315f866a9bed03d3251e53dd4c46d99a74b9c6138ac1df141c5b9c4a0f4a350

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses

tests:
  - script:
      - typstyle --version

about:
  homepage: https://github.com/typstyle-rs/typstyle
  repository: https://github.com/typstyle-rs/typstyle
  documentation: https://typstyle-rs.github.io/typstyle/
  license: Apache-2.0
  license_file:
    - LICENSE
    - crates/typstyle/THIRDPARTY_LICENSES.yaml
  summary: Beautiful and reliable typst code formatter

extra:
  recipe-maintainers:
    - pavelzw
