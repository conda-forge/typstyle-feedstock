context:
  name: typstyle
  version: 0.13.17

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/typstyle-rs/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ecf01327e3543c076faa8aab3d350fdea01c96c11df1f528d2a0cce40d963bd7

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses

tests:
  - script:
     - typstyle --version

about:
  homepage: https://github.com/typstyle-rs/typstyle
  repository: https://github.com/typstyle-rs/typstyle
  documentation: https://typstyle-rs.github.io/typstyle/
  license: Apache-2.0
  license_file:
    - LICENSE
    - crates/typstyle/THIRDPARTY_LICENSES.yaml
  summary: Beautiful and reliable typst code formatter

extra:
  recipe-maintainers:
    - pavelzw
