context:
  name: typstyle
  version: "0.13.18"

package:
  name: ${{ name | lower }}
  version: ${{ version }}

source:
  url: https://github.com/typstyle-rs/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 9f817d410e493d734552f120c419730c668bd4e5d14fd00ab208b29bf2aaa387

build:
  number: 0

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses

tests:
  - script:
      - typstyle --version

about:
  homepage: https://github.com/typstyle-rs/typstyle
  repository: https://github.com/typstyle-rs/typstyle
  documentation: https://typstyle-rs.github.io/typstyle/
  license: Apache-2.0
  license_file:
    - LICENSE
    - crates/typstyle/THIRDPARTY_LICENSES.yaml
  summary: Beautiful and reliable typst code formatter

extra:
  recipe-maintainers:
    - pavelzw
